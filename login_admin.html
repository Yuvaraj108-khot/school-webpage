<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin / Teacher Portal | SBS Karkala</title>
    <link rel="icon" href="images/logo.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="login-page" style="background-color: #2c3e50;">

    <div class="login-box">
        <div style="text-align: center; margin-bottom: 2rem;">
            <img src="images/logo.png" alt="SBRS Logo" style="width: 80px; margin: 0 auto 1rem auto;">
            <div>
                <a href="index.html"
                    style="font-family: var(--font-heading); font-size: 1.5rem; color: var(--primary-color);">SBRS
                    Karkala</a>
            </div>
            <p style="color: var(--accent-color); font-weight: bold; margin-top: 0.5rem;">Teacher / Admin Portal</p>
        </div>

        <form class="contact-form" id="adminLoginForm">
            <div style="margin-bottom: 1rem; text-align: left;">
                <label style="display: block; margin-bottom: 5px;">Staff ID</label>
                <div style="position: relative;">
                    <i class="fas fa-chalkboard-teacher"
                        style="position: absolute; left: 10px; top: 12px; color: #999;"></i>
                    <input type="text" id="staffId" placeholder="Enter Staff ID" style="padding-left: 35px;" required>
                </div>
            </div>

            <div style="margin-bottom: 1rem; text-align: left;">
                <label style="display: block; margin-bottom: 5px;">Password</label>
                <div style="position: relative;">
                    <i class="fas fa-lock" style="position: absolute; left: 10px; top: 12px; color: #999;"></i>
                    <input type="password" id="staffPassword" placeholder="Enter Password" style="padding-left: 35px;" required>
                </div>
            </div>

            <div id="loginError" style="display:none; color:#ea5455; font-size:0.85rem; margin-bottom:10px; text-align:center;"></div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Secure Login</button>

            <div style="margin-top: 1rem; text-align: center; font-size: 0.9rem;">
                <a href="reset_password.html" style="color: var(--secondary-color);">Forgot Password?</a>
            </div>
        </form>

        <div style="margin-top: 2rem; border-top: 1px solid #eee; padding-top: 1rem;">
            <p style="font-size: 0.8rem;">Are you a student?</p>
            <a href="login_parent.html" class="btn btn-outline"
                style="border-color: var(--primary-color); color: var(--primary-color); padding: 5px 15px; font-size: 0.8rem; margin-top: 5px;">Student
                Login</a>
        </div>

        <div style="margin-top: 1.5rem; padding: 10px; background: rgba(255,255,255,0.08); border-radius: 5px; font-size: 0.75rem; color: #aaa;">
            <p><strong>Demo Credentials:</strong></p>
            <p>Admin: admin / pass</p>
            <p>Teacher: teacher / pass</p>
        </div>
    </div>

    <script>
        // Redirect if already logged in
        (function () {
            var role = sessionStorage.getItem('role');
            if (role === 'admin') window.location.href = 'dashboard_admin.html';
            else if (role === 'teacher') window.location.href = 'dashboard_teacher.html';
        })();

        document.getElementById('adminLoginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            var id = document.getElementById('staffId').value.trim();
            var pass = document.getElementById('staffPassword').value;
            var errDiv = document.getElementById('loginError');
            errDiv.style.display = 'none';

            // Resolve API Endpoint dynamically with fallback to 5000
            const API = "https://school-webpage-1uky.onrender.com/api";

            // Try backend login first
            try {
                const response = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: id, password: pass })
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    if (data.role === 'admin') {
                        sessionStorage.setItem('role', 'admin');
                        sessionStorage.setItem('staff_id', data.staff_id);
                        window.location.href = 'dashboard_admin.html';
                        return;
                    } else if (data.role === 'teacher') {
                        sessionStorage.setItem('role', 'teacher');
                        sessionStorage.setItem('teacher_name', data.teacher_name);
                        sessionStorage.setItem('staff_id', data.staff_id);
                        window.location.href = 'dashboard_teacher.html';
                        return;
                    }
                } else if (!response.ok && data.error && !data.error.includes('not found in database')) {
                    errDiv.textContent = data.error;
                    errDiv.style.display = 'block';
                    return;
                }
            } catch (err) {
                console.warn('Backend login unavailable, falling back to static checks:', err);
            }

            // Fallback static checks
            if (id.toLowerCase() === 'admin' && pass === 'pass') {
                sessionStorage.setItem('role', 'admin');
                sessionStorage.setItem('staff_id', id);
                window.location.href = 'dashboard_admin.html';
            } else if (id.toLowerCase() === 'teacher' && pass === 'pass') {
                sessionStorage.setItem('role', 'teacher');
                sessionStorage.setItem('teacher_name', 'Teacher Name');
                sessionStorage.setItem('staff_id', id);
                window.location.href = 'dashboard_teacher.html';
            } else {
                errDiv.textContent = 'Invalid Staff ID or Password.';
                errDiv.style.display = 'block';
            }
        });
    </script>
</body>

</html>
