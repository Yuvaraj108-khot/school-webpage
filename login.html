<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SBS Karkala</title>
    <link rel="icon" href="images/logo.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            text-decoration: none;
            color: var(--primary-color);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: var(--transition);
        }

        .back-btn:hover {
            color: var(--secondary-color);
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <div class="login-page" style="position: relative;">
        <!-- Back Button -->
        <a href="index.html" class="back-btn">
            <i class="fas fa-home"></i> Back to Home
        </a>

        <div class="login-container">
            <div style="text-align: center; margin-bottom: 2rem;">
                <img src="images/logo.png" alt="Logo" style="width: 80px; margin: 0 auto 1rem auto;">
                <h2 style="color: var(--primary-color); margin-bottom: 0.5rem;">Welcome Back</h2>
                <p style="color: #666; font-size: 0.9rem;">Sign in to access your dashboard</p>
            </div>

            <form id="loginForm" class="contact-form">
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; margin-bottom: 5px; color: #333;">Username / ID / Email</label>
                    <input type="text" id="username" placeholder="Admin, staff ID, student ID, name, or email" required>
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 5px; color: #333;">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>

            <div style="margin-top: 1.5rem; text-align: center; font-size: 0.8rem; color: #666;">
                <p>Forgot user ID or password? <a href="reset_password.html" style="color: var(--primary-color);">Reset Password</a></p>
            </div>

            <div
                style="margin-top: 1rem; padding: 10px; background: #f8f9fa; border-radius: 5px; font-size: 0.75rem; color: #888;">
                <p><strong>Login help:</strong></p>
                <p>Admin: admin / pass</p>
                <p>Students: use ID, name, or email with the password set by admin.</p>
                <p>Teachers: use Staff ID or email with the password set by admin.</p>
            </div>
        </div>
    </div>

    <script>
        // Redirect if already logged in
        (function () {
            var role = sessionStorage.getItem('role');
            if (role === 'admin') window.location.href = 'dashboard_admin.html';
            else if (role === 'teacher') window.location.href = 'dashboard_teacher.html';
            else if (role === 'student') window.location.href = 'dashboard_student.html';
        })();

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;

            // Resolve API Endpoint dynamically with fallback to 5000
            const API = "http://localhost:5000/api";

            // Try backend login first
            try {
                const response = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    if (data.role === 'admin') {
                        sessionStorage.setItem('role', 'admin');
                        sessionStorage.setItem('staff_id', data.staff_id);
                        window.location.href = 'dashboard_admin.html';
                        return;
                    } else if (data.role === 'teacher') {
                        sessionStorage.setItem('role', 'teacher');
                        sessionStorage.setItem('teacher_name', data.teacher_name);
                        sessionStorage.setItem('staff_id', data.staff_id);
                        window.location.href = 'dashboard_teacher.html';
                        return;
                    } else if (data.role === 'student') {
                        sessionStorage.setItem('role', 'student');
                        sessionStorage.setItem('student_code', data.student_code);
                        sessionStorage.setItem('student_name', data.student_name);
                        sessionStorage.setItem('student_class', data.student_class || '');
                        sessionStorage.setItem('student_medium', data.student_medium || '');
                        window.location.href = 'dashboard_student.html';
                        return;
                    }
                } else if (!response.ok && data.error && !data.error.includes('not found in database')) {
                    alert(data.error);
                    return;
                }
            } catch (err) {
                console.warn('Backend login unavailable, falling back to local checks:', err);
            }

            // Admin
            if (user.toLowerCase() === 'admin' && pass === 'pass') {
                sessionStorage.setItem('role', 'admin');
                sessionStorage.setItem('staff_id', user);
                window.location.href = 'dashboard_admin.html';
                return;
            }

            // Student â€” look up from localStorage and validate password
            {
                let found = false;
                const userLower = user.toLowerCase();
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (!key || !key.startsWith('sbrs_students_')) continue;
                    try {
                        const students = JSON.parse(localStorage.getItem(key) || '[]');
                        const student = students.find(s =>
                            (s.student_code && s.student_code.toLowerCase() === userLower) ||
                            (s.email && s.email.toLowerCase() === userLower) ||
                            (s.name && s.name.toLowerCase() === userLower)
                        );
                        if (student) {
                            const correctPass = student.password || student.student_code;
                            if (pass === correctPass) {
                                sessionStorage.setItem('role', 'student');
                                sessionStorage.setItem('student_code', student.student_code);
                                sessionStorage.setItem('student_name', student.name);
                                sessionStorage.setItem('student_class', student.class || '');
                                sessionStorage.setItem('student_medium', student.medium || '');
                                window.location.href = 'dashboard_student.html';
                            } else {
                                alert('Incorrect password. Default password is your Student ID (e.g. C1-001).');
                            }
                            found = true;
                            break;
                        }
                    } catch (err) { /* skip */ }
                }
                if (!found) {
                    alert('User not found. Use Admin, teacher Staff ID/email, or student ID/name/email.');
                }
                return;
            }

            alert('Invalid Username or Password. Please use the correct login portal.');
        });
    </script>
</body>

</html>
