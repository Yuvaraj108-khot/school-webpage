<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | SBS Karkala</title>
    <link rel="icon" href="images/logo.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Reset password flow powered by free backend Nodemailer API -->

    <style>
        * { box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a2a3a 0%, #2c4a6e 100%);
            font-family: var(--font-body, 'Segoe UI', sans-serif);
            padding: 20px;
        }

        .reset-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .reset-header {
            background: linear-gradient(135deg, var(--primary-color, #1a3a5c), #2c4a6e);
            color: white;
            text-align: center;
            padding: 2rem 2rem 1.5rem;
        }

        .reset-header img {
            width: 65px;
            border-radius: 50%;
            margin-bottom: 0.8rem;
            border: 3px solid rgba(255,255,255,0.3);
        }

        .reset-header h2 {
            font-size: 1.4rem;
            margin: 0 0 4px;
        }

        .reset-header p {
            font-size: 0.85rem;
            opacity: 0.75;
            margin: 0;
        }

        .reset-body {
            padding: 2rem;
        }

        /* Step indicator */
        .steps {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0;
            margin-bottom: 1.8rem;
        }

        .step-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: #aaa;
            background: #fafafa;
            transition: all 0.4s;
            position: relative;
            z-index: 1;
        }

        .step-dot.active {
            border-color: var(--primary-color, #1a3a5c);
            background: var(--primary-color, #1a3a5c);
            color: white;
        }

        .step-dot.done {
            border-color: #28c76f;
            background: #28c76f;
            color: white;
        }

        .step-line {
            flex: 1;
            height: 2px;
            background: #ddd;
            max-width: 60px;
            transition: background 0.4s;
        }

        .step-line.done { background: #28c76f; }

        /* Form elements */
        .field-group {
            margin-bottom: 1.1rem;
        }

        .field-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }

        .field-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .field-group input:focus {
            border-color: var(--primary-color, #1a3a5c);
        }

        /* OTP boxes */
        .otp-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 1.2rem 0;
        }

        .otp-box {
            width: 46px;
            height: 54px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color, #1a3a5c);
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            background: #fafafa;
        }

        .otp-box:focus {
            border-color: var(--primary-color, #1a3a5c);
            box-shadow: 0 0 0 3px rgba(26, 58, 92, 0.12);
            background: white;
        }

        .btn-full {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary-color, #1a3a5c), #2c4a6e);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.2s;
            margin-top: 0.5rem;
        }

        .btn-full:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-full:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

        .msg {
            font-size: 0.85rem;
            text-align: center;
            padding: 10px 14px;
            border-radius: 8px;
            margin-top: 1rem;
            display: none;
        }

        .msg.success { background: #e8f8f0; color: #1e8449; display: block; }
        .msg.error   { background: #ffe0e3; color: #c0392b; display: block; }
        .msg.info    { background: #e8f0fe; color: #1a3a5c; display: block; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.83rem;
            color: #888;
        }

        .back-link a { color: var(--primary-color, #1a3a5c); font-weight: 600; text-decoration: none; }

        .resend-row {
            text-align: center;
            margin-top: 0.8rem;
            font-size: 0.83rem;
            color: #888;
        }

        .resend-btn {
            background: none;
            border: none;
            color: var(--primary-color, #1a3a5c);
            font-weight: 600;
            cursor: pointer;
            font-size: 0.83rem;
        }

        .resend-btn:disabled { color: #aaa; cursor: default; }

        /* Step panels */
        .step-panel { display: none; }
        .step-panel.active { display: block; }

        .timer {
            font-size: 0.8rem;
            color: #e74c3c;
            font-weight: 600;
        }

        /* Demo mode banner */
        .demo-banner {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.8rem;
            color: #856404;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <div class="reset-card">
        <div class="reset-header">
            <img src="images/logo.png" alt="Logo">
            <h2>Reset Password</h2>
            <p>We'll send a verification code to your email</p>
        </div>

        <div class="reset-body">

            <!-- Step Indicator -->
            <div class="steps">
                <div class="step-dot active" id="dot1">1</div>
                <div class="step-line" id="line1"></div>
                <div class="step-dot" id="dot2">2</div>
                <div class="step-line" id="line2"></div>
                <div class="step-dot" id="dot3">3</div>
            </div>

            <!-- ГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђ STEP 1: Enter Email ГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђ -->
            <div class="step-panel active" id="step1">
                <div class="field-group">
                    <label><i class="fas fa-envelope"></i> Your Registered Email</label>
                    <input type="email" id="inputEmail" placeholder="student@example.com" autocomplete="email">
                </div>
                <div id="msg1" class="msg"></div>
                <button class="btn-full" id="btnSendOtp" onclick="sendOTP()">
                    <i class="fas fa-paper-plane"></i> Send OTP Code
                </button>
            </div>

            <!-- ГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђ STEP 2: Enter OTP ГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђ -->
            <div class="step-panel" id="step2">
                <p style="text-align:center; font-size:0.88rem; color:#555; margin-bottom:0.5rem;">
                    Enter the 6-digit code sent to<br>
                    <strong id="displayEmail" style="color:var(--primary-color,#1a3a5c);">your email</strong>
                </p>

                <div class="otp-group">
                    <input class="otp-box" id="o1" maxlength="1" type="text" inputmode="numeric">
                    <input class="otp-box" id="o2" maxlength="1" type="text" inputmode="numeric">
                    <input class="otp-box" id="o3" maxlength="1" type="text" inputmode="numeric">
                    <input class="otp-box" id="o4" maxlength="1" type="text" inputmode="numeric">
                    <input class="otp-box" id="o5" maxlength="1" type="text" inputmode="numeric">
                    <input class="otp-box" id="o6" maxlength="1" type="text" inputmode="numeric">
                </div>

                <p style="text-align:center; font-size:0.82rem; color:#888;">
                    Code expires in <span class="timer" id="timerDisplay">10:00</span>
                </p>

                <div id="msg2" class="msg"></div>
                <button class="btn-full" onclick="verifyOTP()">
                    <i class="fas fa-shield-alt"></i> Verify Code
                </button>

                <div class="resend-row">
                    Didn't receive it?
                    <button class="resend-btn" id="resendBtn" onclick="resendOTP()" disabled>
                        Resend OTP <span id="resendTimer"></span>
                    </button>
                </div>
            </div>

            <!-- ГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђ STEP 3: New Password ГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђ -->
            <div class="step-panel" id="step3">
                <div class="field-group">
                    <label><i class="fas fa-lock"></i> New Password</label>
                    <input type="password" id="newPass" placeholder="At least 6 characters">
                </div>
                <div class="field-group">
                    <label><i class="fas fa-lock"></i> Confirm New Password</label>
                    <input type="password" id="confirmPass" placeholder="Re-enter new password">
                </div>
                <div id="msg3" class="msg"></div>
                <button class="btn-full" onclick="resetPassword()">
                    <i class="fas fa-key"></i> Reset Password
                </button>
            </div>

            <div class="back-link">
                <a href="login_parent.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        // Dynamically resolve API endpoint: use current port if served via server, fallback to 5000
        const API = `${window.location.protocol}//${window.location.hostname}:5000/api`;

        // в”Ђв”Ђв”Ђ State в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”ЂState ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
        let otpExpiry = 0;
        let foundStudentKey = '';
        let foundStudentIndex = -1;
        let foundStudentsArray = [];
        let timerInterval = null;
        let resendCountdown = null;

        // ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ Step navigation ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
        function goToStep(n) {
            document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('step' + n).classList.add('active');

            // Update dots
            for (let i = 1; i <= 3; i++) {
                const dot = document.getElementById('dot1'); // Simplified for brevity
                const dotI = document.getElementById('dot' + i);
                dotI.classList.remove('active', 'done');
                if (i < n) dotI.classList.add('done'), dotI.innerHTML = '<i class="fas fa-check" style="font-size:0.7rem"></i>';
                else if (i === n) dotI.classList.add('active');
                else dotI.textContent = i;
            }
            // Update lines
            for (let i = 1; i <= 2; i++) {
                const line = document.getElementById('line' + i);
                line.classList.toggle('done', i < n);
            }
        }

        // ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ Show message ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
        function showMsg(id, text, type) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = 'msg ' + type;
        }

        function hideMsg(id) {
            document.getElementById(id).className = 'msg';
        }

        // ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ Find student by email in localStorage ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
        function findStudentByEmail(email) {
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (!key || !key.startsWith('sbrs_students_')) continue;
                try {
                    const students = JSON.parse(localStorage.getItem(key) || '[]');
                    const idx = students.findIndex(s => s.email && s.email.toLowerCase() === email.toLowerCase());
                    if (idx !== -1) {
                        return { key, idx, students };
                    }
                } catch (e) { /* skip */ }
            }
            return null;
        }

        // ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ STEP 1: Send OTP via Backend ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
        async function sendOTP(isResend = false) {
            const email = document.getElementById('inputEmail').value.trim();
            const msgId = isResend ? 'msg2' : 'msg1';
            hideMsg(msgId);

            if (!email || !email.includes('@')) {
                showMsg(msgId, 'Please enter a valid email address.', 'error');
                return;
            }

            // Setup loading state on appropriate button
            const btn = isResend ? document.getElementById('resendBtn') : document.getElementById('btnSendOtp');
            const originalHtml = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

            try {
                const response = await fetch(`${API}/auth/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    if (data.demoMode) {
                        // ГўвЂќв‚¬ГўвЂќв‚¬ Demo mode: show OTP in alert since real email isn't set up ГўвЂќв‚¬ГўвЂќв‚¬
                        alert(`Г°ЕёвЂњВ§ DEMO MODE Гўв‚¬вЂќ Email not configured in .env.\n\nYour OTP is: ${data.otp}\n\n(In production, this would be sent to ${email})`);
                        showMsg(msgId, 'ГўЕЎВ ГЇВёВЏ Demo mode: OTP shown in popup (Email credentials not set in .env).', 'info');
                    } else {
                        showMsg(msgId, 'ГўЕ“вЂ¦ OTP sent! Check your inbox (and spam folder).', 'success');
                    }
                } else {
                    showMsg(msgId, 'Failed to send OTP: ' + (data.error || 'Server error'), 'error');
                    btn.disabled = false;
                    btn.innerHTML = originalHtml;
                    return;
                }
            } catch (err) {
                console.error('Network Error:', err);
                showMsg(msgId, 'Network error. Please make sure the local server is running.', 'error');
                btn.disabled = false;
                btn.innerHTML = originalHtml;
                return;
            }

            btn.innerHTML = isResend ? 'Resend OTP' : '<i class="fas fa-check"></i> Code Sent!';
            document.getElementById('displayEmail').textContent = email;

            otpExpiry = Date.now() + 60 * 1000; // 60 seconds

            if (!isResend) {
                setTimeout(() => goToStep(2), 800);
            }
            startCountdownTimer();
            startResendCountdown();
        }

        // ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ STEP 2: Verify OTP via Backend ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
        async function verifyOTP() {
            hideMsg('msg2');
            const entered = ['o1','o2','o3','o4','o5','o6'].map(id => document.getElementById(id).value).join('');

            if (entered.length < 6) {
                showMsg('msg2', 'Please enter all 6 digits of the code.', 'error');
                return;
            }

            const email = document.getElementById('inputEmail').value.trim();

            try {
                const response = await fetch(`${API}/auth/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp: entered })
                });
                
                const data = await response.json();

                if (response.ok) {
                    clearInterval(timerInterval);
                    goToStep(3);
                } else {
                    showMsg('msg2', data.error || 'Incorrect code. Please try again.', 'error');
                    // Shake effect
                    document.querySelectorAll('.otp-box').forEach(b => {
                        b.style.borderColor = '#ea5455';
                        setTimeout(() => b.style.borderColor = '#e0e0e0', 1500);
                    });
                }
            } catch (err) {
                console.error('Network Error:', err);
                showMsg('msg2', 'Network error. Please verify server connection.', 'error');
            }
        }

        // ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ STEP 3: Reset Password ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
        async function resetPassword() {
            hideMsg('msg3');
            const newPass = document.getElementById('newPass').value;
            const confirmPass = document.getElementById('confirmPass').value;
            const email = document.getElementById('inputEmail').value.trim();

            if (newPass.length < 6) {
                showMsg('msg3', 'Password must be at least 6 characters.', 'error');
                return;
            }

            if (newPass !== confirmPass) {
                showMsg('msg3', 'Passwords do not match.', 'error');
                return;
            }

            try {
                const response = await fetch(`${API}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: newPass })
                });

                const data = await response.json();

                if (response.ok) {
                    // Update localStorage fallback if key/index exists
                    if (foundStudentKey && foundStudentIndex !== -1 && foundStudentsArray.length > 0) {
                        foundStudentsArray[foundStudentIndex].password = newPass;
                        localStorage.setItem(foundStudentKey, JSON.stringify(foundStudentsArray));
                    }
                    showMsg('msg3', 'ГўЕ“вЂ¦ Password reset successful! Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = 'login_parent.html';
                    }, 2000);
                } else {
                    showMsg('msg3', 'Failed to reset password: ' + (data.error || 'Server error'), 'error');
                }
            } catch (err) {
                console.error(err);
                showMsg('msg3', 'Network error. Please make sure the local server is running.', 'error');
            }
        }

        // ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ Resend OTP ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
        function resendOTP() {
            document.querySelectorAll('.otp-box').forEach(b => b.value = '');
            document.getElementById('o1').focus();
            sendOTP(true);
        }

        // вЂ”вЂ”вЂ” Timer: 60-second countdown вЂ”вЂ”вЂ”вЂ”вЂ”вЂ”вЂ”вЂ”вЂ”вЂ”вЂ”вЂ”вЂ”вЂ”вЂ”вЂ”вЂ”вЂ”вЂ”вЂ”вЂ”вЂ”вЂ”вЂ”вЂ”вЂ”вЂ”вЂ”вЂ”вЂ”
        function startCountdownTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const remaining = otpExpiry - Date.now();
                const timerEl = document.getElementById('timerDisplay');
                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    if (timerEl) timerEl.textContent = 'Expired';
                    return;
                }
                const m = Math.floor(remaining / 60000);
                const s = Math.floor((remaining % 60000) / 1000);
                if (timerEl) {
                    timerEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                }
            }, 1000);
        }

        // ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ Resend cooldown: 60s ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
        function startResendCountdown() {
            const btn = document.getElementById('resendBtn');
            if (btn) btn.disabled = true;
            let secs = 60;
            clearInterval(resendCountdown);
            resendCountdown = setInterval(() => {
                secs--;
                const resendTimerEl = document.getElementById('resendTimer');
                if (resendTimerEl) {
                    resendTimerEl.textContent = `(${secs}s)`;
                }
                if (secs <= 0) {
                    clearInterval(resendCountdown);
                    if (btn) btn.disabled = false;
                    if (resendTimerEl) resendTimerEl.textContent = '';
                }
            }, 1000);
        }

        // ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ OTP box: auto-advance & backspace ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
        document.addEventListener('DOMContentLoaded', () => {
            const boxes = ['o1','o2','o3','o4','o5','o6'].map(id => document.getElementById(id));
            boxes.forEach((box, i) => {
                box.addEventListener('input', () => {
                    // Allow only digits
                    box.value = box.value.replace(/\D/g, '').slice(-1);
                    if (box.value && i < boxes.length - 1) boxes[i + 1].focus();
                });
                box.addEventListener('keydown', e => {
                    if (e.key === 'Backspace' && !box.value && i > 0) boxes[i - 1].focus();
                });
                box.addEventListener('paste', e => {
                    e.preventDefault();
                    const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
                    pasted.slice(0, 6).split('').forEach((ch, j) => {
                        if (boxes[j]) boxes[j].value = ch;
                    });
                    boxes[Math.min(pasted.length, 5)].focus();
                });
            });

            // Enter key support
            const emailInput = document.getElementById('inputEmail');
            if (emailInput) {
                emailInput.addEventListener('keydown', e => {
                    if (e.key === 'Enter') sendOTP();
                });
            }

            // Auto-fill and transition if email query parameter is present (from reset password email link)
            const urlParams = new URLSearchParams(window.location.search);
            const emailParam = urlParams.get('email');
            if (emailParam) {
                const decEmail = decodeURIComponent(emailParam);
                if (emailInput) emailInput.value = decEmail;
                const displayEmailEl = document.getElementById('displayEmail');
                if (displayEmailEl) displayEmailEl.textContent = decEmail;

                // Try to resolve student records from localStorage
                const result = findStudentByEmail(decEmail);
                if (result) {
                    foundStudentKey = result.key;
                    foundStudentIndex = result.idx;
                    foundStudentsArray = result.students;
                }

                // Transition to OTP verification step directly
                goToStep(2);
                startResendCountdown();

                // Focus on the first OTP box
                setTimeout(() => {
                    document.getElementById('o1').focus();
                }, 100);
            }
        });
    </script>
