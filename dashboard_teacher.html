<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard | SBRS</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: #2c3e50;
            color: white;
            padding: 2rem 0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-menu a {
            padding: 15px 20px;
            color: #ccc;
            display: block;
            border-left: 4px solid transparent;
            transition: 0.3s;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-left-color: #f1c40f;
        }

        .main-content {
            flex: 1;
            padding: 2rem;
            background: #f4f7f6;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: white;
            padding: 1rem 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .card-box {
            background: white;
            padding: 1.5rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .student-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        @media (max-width: 768px) {
            .dashboard-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div style="text-align: center; padding: 0 2rem 2rem;">
                <img src="logo.png" style="width: 50px; border-radius: 50%;">
                <h3 style="margin-top: 10px;">Teacher Panel</h3>
            </div>
            <nav class="sidebar-menu">
                <a href="#" class="active"><i class="fas fa-edit"></i> Enter Marks</a>
                <a href="#"><i class="fas fa-check-square"></i> Attendance</a>
                <a href="#"><i class="fas fa-book"></i> Daily Log</a>
            </nav>
            <div style="margin-top: auto; padding: 20px;">
                <a href="login.html" style="color: #ea5455;"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="header-bar">
                <h2>Welcome, Staff</h2>
                <div class="user-info">
                    <span>ID: T-102</span>
                    <a href="index.html" class="btn btn-outline"
                        style="border: 1px solid var(--primary-color); color: var(--primary-color); margin-left: 10px; padding: 5px 15px; font-size: 0.8rem;">Back
                        to Home</a>
                </div>
            </div>

            <!-- Daily Log -->
            <div class="card-box">
                <h3><i class="fas fa-book-open"></i> Daily Topic Log</h3>
                <p style="color: #666; margin-bottom: 1rem;">Record topics covered in today's class.</p>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <select>
                        <option>Select Class</option>
                        <option>Class 10 A</option>
                        <option>Class 10 B</option>
                        <option>Class 9 A</option>
                    </select>
                    <select>
                        <option>Select Subject</option>
                        <option>Mathematics</option>
                        <option>Physics</option>
                    </select>
                </div>
                <textarea rows="3"
                    placeholder="Enter topics covered (e.g., Quadratic Equations - Introduction)"></textarea>
                <button class="btn btn-primary" onclick="alert('Log Saved Successfully!')">Save Log</button>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem;">
                <!-- Marks Entry -->
                <div class="card-box">
                    <h3><i class="fas fa-pen-alt"></i> Enter Marks</h3>
                    <select style="margin-bottom: 1rem;">
                        <option>Mid-Term Exam 2026</option>
                        <option>Unit Test 1</option>
                    </select>

                    <div class="student-list">
                        <div class="student-list-item">
                            <span>1. Rahul Kumar</span>
                            <input type="number" placeholder="Marks" style="width: 80px; margin-bottom: 0;">
                        </div>
                        <div class="student-list-item">
                            <span>2. Sharma G</span>
                            <input type="number" placeholder="Marks" style="width: 80px; margin-bottom: 0;">
                        </div>
                        <div class="student-list-item">
                            <span>3. Ananya S</span>
                            <input type="number" placeholder="Marks" style="width: 80px; margin-bottom: 0;">
                        </div>
                    </div>
                    <br>
                    <button class="btn btn-primary" onclick="alert('Marks Submitted!')">Submit Marks</button>
                </div>

                <!-- Attendance -->
                <div class="card-box">
                    <h3><i class="fas fa-user-check"></i> Mark Attendance</h3>
                    <p style="text-align: right; font-size: 0.9rem; color: #666;">Date: 06-02-2026</p>
                    <div class="student-list">
                        <div class="student-list-item">
                            <span>1. Rahul Kumar</span>
                            <input type="checkbox" checked style="width: 20px; height: 20px; margin-bottom: 0;">
                        </div>
                        <div class="student-list-item">
                            <span>2. Sharma G</span>
                            <input type="checkbox" checked style="width: 20px; height: 20px; margin-bottom: 0;">
                        </div>
                        <div class="student-list-item">
                            <span>3. Ananya S</span>
                            <input type="checkbox" style="width: 20px; height: 20px; margin-bottom: 0;">
                        </div>
                    </div>
                    <br>
                    <button class="btn btn-primary" onclick="alert('Attendance Marked!')">Save Attendance</button>
                </div>
            </div>

        </div>
    </div>
</body>

</html>
